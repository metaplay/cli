name: Build CLI

on:
  workflow_dispatch:
  push:

run-name: Build from ${{ github.head_ref || github.ref_name }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubicloud-standard-8

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          show-progress: false # suppress the noisy progress status output

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2

      - name: Check go mod tidy
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: go mod tidy caused changes. Please run 'go mod tidy' locally and commit the changes."
            git status
            git diff
            exit 1
          fi

      - name: Build CLI
        run: go build .

      - name: Run unit tests
        run: go test ./...
