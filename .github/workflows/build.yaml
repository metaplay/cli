name: Build CLI

on:
  workflow_dispatch:
  push:

run-name: Build from ${{ github.head_ref || github.ref_name }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubicloud-standard-8

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          show-progress: false # suppress the noisy progress status output

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2

      - name: Check go mod tidy
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: go mod tidy caused changes. Please run 'go mod tidy' locally and commit the changes."
            git status
            git diff
            exit 1
          fi

      - name: Build CLI
        run: go build .

      - name: Run unit tests
        run: go test ./...
