name: Publish Pages

on:
  push:
    branches:
      - main
      - dev/pages-ci # dev branch for easier iteration
    # Run on changes to install.sh and publish-pages.yml. Keeps the install.sh public URL up-to-date.
    paths:
      - install.sh
      - install.ps1
      - .github/workflows/publish-pages.yml
    # Trigger on version tags for official releases like '1.2.3' (but not for dev releases like '1.2.3-xyz').
    # Keeps the command reference up-to-date with latest official release.
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read     # to checkout your code
  pages: write       # to publish the Pages site
  id-token: write    # required by actions/deploy-pages

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Copy the install.sh to be available publicly at https://metaplay.github.io/cli/install.sh.
      # GitHub Pages isn't throttled like the https://raw.githubusercontent.com/metaplay/cli/main/install.sh.
      - name: Prepare Pages output
        run: |
          # Copy install.sh and install.ps1 into 'site/'
          mkdir site
          cp install.sh site/
          cp install.ps1 site/

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Show published URL
        run: echo "🎉 Site published at ${{ steps.deployment.outputs.page_url }}"
